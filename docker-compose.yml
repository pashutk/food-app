services:
  app:
    build: .
    ports:
      - "3000:3000"
    volumes:
      - ./data:/app/data
    env_file:
      - .env
    restart: unless-stopped

  mcp-server:
    build:
      context: ./mcp-server
    stdin_open: true
    environment:
      - API_BASE_URL=http://app:3000
      - AUTH_EMAIL=${AUTH_EMAIL}
      - AUTH_PASSWORD=${AUTH_PASSWORD}
    depends_on:
      - app
    profiles:
      - mcp
